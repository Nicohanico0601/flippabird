<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Webcam Flappy Bird</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }
        canvas {
            border: 5px solid #fff;
            background: #70c5ce;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #video-container {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 200px;
            height: 150px;
            border: 3px solid #00ff00;
            border-radius: 10px;
            transform: scaleX(-1); /* 鏡像顯示 */
            background: #000;
        }
        .ui-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            text-align: right;
        }
        h1 { margin: 0; font-size: 24px; color: #f1c40f; }
    </style>
</head>
<body>

    <video id="input_video" style="display:none;"></video>
    
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <canvas id="video-container" width="200" height="150"></canvas>

    <div class="ui-overlay">
        <h1>分數: <span id="scoreVal">0</span></h1>
        <p style="font-size: 14px;">操作方法：舉手（指尖過半）觸發跳躍</p>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const debugCanvas = document.getElementById('video-container');
        const dctx = debugCanvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');

        // --- 遊戲變數 ---
        let birdY = 300;
        let velocity = 0;
        let gravity = 0.5;
        let pipes = [];
        let score = 0;
        let gameActive = true;
        let isJumping = false; // 用於防止連發

        // --- 遊戲邏輯函式 ---

        function createPipe() {
            const gap = 160; 
            const minHeight = 50;
            const topHeight = Math.random() * (canvas.height - gap - minHeight * 2) + minHeight;
            pipes.push({
                x: canvas.width,
                top: topHeight,
                bottom: canvas.height - topHeight - gap,
                passed: false
            });
        }

        function resetGame() {
            birdY = 300;
            velocity = 0;
            pipes = [];
            score = 0;
            scoreEl.innerText = score;
            gameActive = true;
            createPipe();
        }

        function draw() {
            // 清除畫布
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                // 物理計算
                velocity += gravity;
                birdY += velocity;

                // 水管生成與移動
                if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 220) {
                    createPipe();
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].x -= 3.5;

                    // 繪製水管
                    ctx.fillStyle = "#2ecc71";
                    ctx.fillRect(pipes[i].x, 0, 50, pipes[i].top); // 上
                    ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, 50, pipes[i].bottom); // 下

                    // 碰撞偵測
                    const birdRect = { x: 50 - 12, y: birdY - 12, w: 24, h: 24 };
                    if (birdRect.x + birdRect.w > pipes[i].x && birdRect.x < pipes[i].x + 50) {
                        if (birdRect.y < pipes[i].top || birdRect.y + birdRect.h > canvas.height - pipes[i].bottom) {
                            gameActive = false;
                        }
                    }

                    // 計分
                    if (!pipes[i].passed && pipes[i].x < 50) {
                        score++;
                        scoreEl.innerText = score;
                        pipes[i].passed = true;
                    }

                    // 移除舊水管
                    if (pipes[i].x < -60) pipes.splice(i, 1);
                }

                // 邊界判定
                if (birdY > canvas.height || birdY < 0) gameActive = false;

            } else {
                // Game Over 畫面
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "bold 40px Arial";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px Arial";
                ctx.fillText("舉手 或 點擊畫面 重啟遊戲", canvas.width / 2, canvas.height / 2 + 40);
            }

            // 繪製小鳥 (圓形)
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(50, birdY, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#d35400";
            ctx.stroke();

            requestAnimationFrame(draw);
        }

        // --- 手勢偵測邏輯 ---

        function onResults(results) {
            // 繪製左上角 Debug 畫面
            dctx.save();
            dctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
            dctx.drawImage(results.image, 0, 0, debugCanvas.width, debugCanvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const indexTip = hand[8]; // 食指指尖座標

                // 如果指尖在畫面上方 (y < 0.4)
                if (indexTip.y < 0.4) {
                    if (!gameActive) {
                        resetGame();
                    } else if (!isJumping) {
                        velocity = -8;
                        isJumping = true; // 鎖定直到手放下來
                    }
                } else if (indexTip.y > 0.6) {
                    isJumping = false; // 重設鎖定
                }

                // 在預覽視窗畫出偵測點
                dctx.fillStyle = "red";
                dctx.beginPath();
                dctx.arc(indexTip.x * debugCanvas.width, indexTip.y * debugCanvas.height, 5, 0, Math.PI*2);
                dctx.fill();
            }
            dctx.restore();
        }

        // --- 初始化設定 ---

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        // 點擊重啟
        canvas.addEventListener('mousedown', () => {
            if (!gameActive) resetGame();
            else velocity = -8;
        });

        camera.start();
        resetGame();
        draw();
    </script>
</body>
</html>
